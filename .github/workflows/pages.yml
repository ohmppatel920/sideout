name: Deploy demo to GitHub Pages

# Publishes the static demo/ folder to GitHub Pages. Runs when the demo
# changes (or manually). The page is self-contained — no build step.
on:
  push:
    branches: [main]
    paths:
      - "demo/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; newer pushes cancel in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload demo/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
