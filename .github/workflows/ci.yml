name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/ validation/

      - name: Ruff lint
        run: uv run ruff check src/ tests/ validation/

      - name: Type check (mypy)
        run: uv run mypy src/

      - name: Tests + coverage
        run: uv run pytest -q --cov=sideout --cov-report=term-missing tests/
